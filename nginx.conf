# ============================================================
# 企业微信批量建群工具 — Nginx 反向代理配置
#
# 使用说明：
#   1. 将此文件复制到服务器 nginx 配置目录
#      Linux:   /etc/nginx/conf.d/wechat-group.conf
#      Windows: C:\nginx\conf\conf.d\wechat-group.conf
#
#   2. 修改下面两处：
#      - server_name: 替换为你的域名或公网 IP
#      - proxy_pass:  确认后端端口是 8082
#
#   3. 重载 nginx：
#      nginx -t          (测试配置是否正确)
#      nginx -s reload   (重载生效)
# ============================================================

server {
    # 监听端口（内网穿透一般用 80 或自定义端口）
    listen 80;

    # 替换为你的域名，如果没有域名就用下划线 _ 匹配所有
    server_name _;

    # 上传文件大小限制（和 Spring Boot 端保持一致）
    client_max_body_size 10m;

    # ===================== 主页面 + API =====================
    location / {
        proxy_pass http://127.0.0.1:8082;

        # 传递真实客户端 IP（让你的操作日志能记录真实 IP 而非 127.0.0.1）
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（建群 API 调用企微可能较慢）
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }
}
